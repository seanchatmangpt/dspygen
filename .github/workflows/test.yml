name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    name: Python 3.11

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install \
            pytest pytest-asyncio \
            "mcp>=1.0.0" \
            "pygls>=2.0.0" "lsprotocol>=2024.0" \
            pydantic pyyaml loguru hypothesis rich

      - name: Install dspygen (no deps)
        run: pip install -e . --no-deps

      - name: Run tests
        run: |
          pytest tests/ --tb=short -q \
            --continue-on-collection-errors \
            --ignore=tests/experiments
        env:
          PYTHONPATH: src
