name: Docs

on:
  push:
    branches:
      - main

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Poetry
        run: pip install "poetry>=1.8.0"

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-docs-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies (with docs extras)
        run: poetry install --with docs --no-interaction

      - name: Build Sphinx docs
        run: |
          mkdir -p docs
          if [ -f docs/Makefile ]; then
            cd docs && poetry run make html
          else
            poetry run sphinx-build -b html docs/ docs/_build/html || \
              poetry run pdoc --docformat google --output-directory docs/_build/html src/dspygen
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
          force_orphan: true
