name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.2.1"

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format (advisory)
        run: ruff format --check src/ || echo "::warning::Some files would be reformatted. Run 'ruff format src/' locally to fix."
